name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run-api-tests:
    runs-on: ubuntu-latest
    name: Run REST Assured API Tests

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Cache Maven Dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and Compile
        run: mvn compile

      - name: Run API Tests
        run: mvn exec:java -Dexec.mainClass="ApiTestSuite"

      - name: Upload Test Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: extent-report
          path: test-reports/
          retention-days: 30
